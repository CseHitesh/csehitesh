# Renders github-metrics.svg (embedded in README.md) using lowlighter/metrics,
# self-hosted here because the shared public demo instances that the old
# github-readme-stats.vercel.app / github-profile-trophy.vercel.app cards relied
# on have been shut down by their maintainers.
#
# One-time setup required before this workflow can succeed:
#   1. Create a classic personal access token at https://github.com/settings/tokens
#      (no scopes are required for public profile stats).
#   2. Add it as a repository secret named METRICS_TOKEN:
#      Settings -> Secrets and variables -> Actions -> New repository secret.
#   3. Run this workflow manually once (Actions tab -> Metrics -> Run workflow),
#      or push to main / wait for the daily schedule.
name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: CseHitesh
          template: classic
          base: "header, activity, community, repositories, metadata"
          plugin_languages: yes
          filename: github-metrics.svg
